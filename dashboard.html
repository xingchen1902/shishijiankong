<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARK 实时监控看板</title><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 20px 24px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 22px; font-weight: 700; }
.header h1 span { color: #60a5fa; }
.header-status { font-size: 13px; color: #94a3b8; }
.header-status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.dot.green { background: #22c55e; }
.dot.yellow { background: #eab308; }
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
.realtime-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 24px; }
.rt-card { background: #1e293b; border-radius: 10px; padding: 14px; text-align: center; border: 1px solid #334155; }
.rt-card .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.rt-card .value { font-size: 20px; font-weight: 700; }
.rt-card .sub { font-size: 11px; color: #64748b; margin-top: 2px; }
.rt-card.blue .value { color: #60a5fa; }
.rt-card.green .value { color: #22c55e; }
.rt-card.red .value { color: #ef4444; }
.rt-card.purple .value { color: #a78bfa; }
.rt-card.orange .value { color: #f59e0b; }
.rt-card.teal .value { color: #14b8a6; }
.today-card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
.today-title { font-size: 14px; font-weight: 600; color: #94a3b8; margin-bottom: 16px; }
.today-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; }
.today-item { background: #0f172a; border-radius: 8px; padding: 12px; }
.today-item .label { font-size: 11px; color: #64748b; margin-bottom: 4px; }
.today-item .value { font-size: 18px; font-weight: 700; }
.today-item.pos .value { color: #22c55e; }
.today-item.neg .value { color: #ef4444; }
.today-item.warn .value { color: #f59e0b; }
.today-item.info .value { color: #60a5fa; }
.today-item.purple .value { color: #a78bfa; }
.today-item .sub { font-size: 11px; color: #475569; margin-top: 2px; }
.section-title { font-size: 16px; font-weight: 600; margin: 20px 0 10px; color: #cbd5e1; }
.table-wrap { overflow-x: auto; background: #1e293b; border-radius: 12px; border: 1px solid #334155; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: #0f172a; color: #94a3b8; font-weight: 600; padding: 12px 10px; text-align: right; border-bottom: 1px solid #334155; position: sticky; top: 0; white-space: nowrap; }
thead th:first-child { text-align: left; }
tbody td { padding: 10px; text-align: right; border-bottom: 1px solid #1a2332; white-space: nowrap; }
tbody td:first-child { text-align: left; color: #94a3b8; font-weight: 500; }
tbody tr:hover { background: #1a2332; }
tbody tr:last-child td { border-bottom: none; }
td.pos { color: #22c55e; }
td.neg { color: #ef4444; }
.events-box { background: #1e293b; border-radius: 12px; border: 1px solid #334155; margin-top: 20px; padding: 16px; max-height: 300px; overflow-y: auto; }
.events-box .event-item { padding: 6px 0; border-bottom: 1px solid #1a2332; font-size: 12px; display: flex; justify-content: space-between; }
.events-box .event-item:last-child { border: none; }
.event-type { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; margin-right: 6px; }
.event-type.bonus_withdraw { background: #450a0a; color: #fca5a5; }
.event-type.stake_in { background: #052e16; color: #86efac; }
.event-type.stake_out { background: #422006; color: #fcd34d; }
.event-type.static_burn { background: #1a052e; color: #d8b4fe; }
.event-type.dynamic { background: #0c4a6e; color: #7dd3fc; }
	.event-type.transfer_720 { background: #1c1917; color: #fdba74; }
.chart-card { background:#1e293b;border-radius:12px;padding:20px;margin-bottom:20px;border:1px solid #334155; }
.footer { text-align: center; padding: 20px; color: #475569; font-size: 12px; }
@media (max-width: 600px) {
  .container { padding: 12px; }
  .today-grid { grid-template-columns: repeat(2, 1fr); }
  .today-item .value { font-size: 15px; }
  .rt-card .value { font-size: 16px; }
}
</style>
</head>
<body>
<div class="header">
  <div>
    <img src="/logo.png" style="width:36px;height:36px;border-radius:50%;vertical-align:middle;margin-right:10px;"><h1 style="display:inline-block;vertical-align:middle;"><span>ARK</span> 实时监控</h1>
    <div style="font-size: 14px; font-weight: 700; color: #f59e0b; margin-top: 4px;">本页面由创亿社区提供</div>
    <div class="header-status" id="headerStatus">连接中...</div>
  </div>
  <div style="display:flex; gap: 12px; align-items: center;">
    <span id="blockInfo" style="font-size:12px;color:#64748b;"></span>
    <span id="refreshTime" style="font-size:12px;color:#64748b;"></span>
  </div>
</div>

<div class="container">
  <!-- 实时余额卡片 -->
  <div class="realtime-grid">
    <div class="rt-card blue"><div class="label">奖金池余额</div><div class="value" id="bonusBal">--</div></div>
    <div class="rt-card green"><div class="label">质押池余额</div><div class="value" id="stakeBal">--</div></div>
    <div class="rt-card purple"><div class="label">今日事件</div><div class="value" id="eventCount">--</div><div class="sub">条</div></div>
    <div class="rt-card orange"><div class="label">最新区块</div><div class="value" id="lastBlock">--</div></div>
  </div>

  <!-- 当日实时汇总 -->
  <div class="today-card">
    <div class="today-title">📊 当日实时汇总 · <span id="todayDate"></span></div>
    <div class="today-grid">
      <div class="today-item warn"><div class="label">奖金池提取</div><div class="value" id="tdBonusWithdraw">--</div></div>
      <div class="today-item info"><div class="label">静态涡轮</div><div class="value" id="tdStatic">--</div></div>
      <div class="today-item purple"><div class="label">动态涡轮</div><div class="value" id="tdTurbo">--</div></div>
      <div class="today-item info"><div class="label">转720天</div><div class="value" id="tdTransfer720">--</div></div>
      <div class="today-item pos"><div class="label">新增质押</div><div class="value" id="tdStakeIn">--</div></div>
      <div class="today-item neg"><div class="label">赎回</div><div class="value" id="tdStakeOut">--</div></div>
      <div class="today-item" id="tdNetStakeCard"><div class="label">净质押量</div><div class="value" id="tdNetStake">--</div></div>
    </div>
  </div>

  <!-- 分时走势图 -->
  <div class="chart-card">
    <div class="today-title">📈 今日分时走势</div>
    <div style="position:relative;height:280px;">
      <canvas id="trendChart"></canvas>
    </div>
  </div>

  <!-- 历史表格 -->
  <div class="section-title">📅 每日历史汇总</div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>日期</th><th>奖金池余额</th><th>奖金池提取</th><th>动静态涡轮</th><th>静态涡轮</th><th>动态涡轮</th><th>转720天</th><th>质押池余额</th><th>新增质押</th><th>赎回</th><th>净质押量</th>
        </tr>
      </thead>
      <tbody id="dailyBody">
        <tr><td colspan="11" style="text-align:center;padding:20px;color:#64748b;">加载中...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- 事件流 -->
  <div class="section-title">⚡ 最新事件流</div>
  <div class="events-box" id="eventStream">
    <div style="text-align:center;color:#64748b;padding:10px;">等待数据...</div>
  </div>
</div>

<div class="footer">ARK 实时监控 · 数据来源 BSC 链上</div>

<script>
var TYPE_LABELS = {
  bonus_withdraw: "奖金池提取", stake_in: "新增质押", stake_out: "赎回",
  static_burn: "静态涡轮", dynamic: "动态涡轮", transfer_720: "转720天"
};
var API_BASE = window.location.origin;

function fmt(n) {
  if (n === null || n === undefined || n === "--") return "--";
  return Number(n).toLocaleString("zh-CN", {minimumFractionDigits: 2, maximumFractionDigits: 2});
}
function fmtInt(n) {
  if (n === null || n === undefined) return "--";
  return Number(n).toLocaleString("zh-CN");
}

function fetchAPI(path) {
  try {
    return fetch(API_BASE + path).then(function(r) { return r.json(); });
  } catch(e) {
    console.error("API error:", path, e);
    return null;
  }
}

function updateHeader(todayInfo) {
  var now = new Date();
  var bjt = new Date(now.getTime() + 8 * 3600000);
  document.getElementById("refreshTime").textContent = "刷新: " + bjt.toISOString().slice(11, 19);
  document.getElementById("todayDate").textContent = bjt.toISOString().slice(0, 10);
  var status = document.getElementById("headerStatus");
  if (todayInfo && todayInfo.data) {
    status.innerHTML = "<span class=\"dot green\"></span>运行中";
  } else {
    status.innerHTML = "<span class=\"dot yellow\"></span>数据等待中";
  }
}

function updateToday(data) {
  if (!data) return;
  document.getElementById("bonusBal").textContent = fmt(data.bonus_balance);
  document.getElementById("stakeBal").textContent = fmt(data.stake_balance);
  document.getElementById("eventCount").textContent = fmtInt(data.event_count);
  document.getElementById("lastBlock").textContent = fmtInt(data.last_block);
  document.getElementById("tdBonusWithdraw").textContent = fmt(data.bonus_withdraw);
  document.getElementById("tdStakeIn").textContent = fmt(data.stake_in);
  document.getElementById("tdStakeOut").textContent = fmt(data.stake_out);
  document.getElementById("tdNetStake").textContent = fmt(data.net_stake);
  document.getElementById("tdStatic").textContent = fmt(data.static_burn);

  document.getElementById("tdTurbo").textContent = fmt(data.dynamic_turbo);
  document.getElementById("tdTransfer720").textContent = fmt(data.transfer_720);
  var nsCard = document.getElementById("tdNetStakeCard");
  if (data.net_stake >= 0) { nsCard.className = "today-item pos"; } else { nsCard.className = "today-item neg"; }
}

function updateBalances(data) {
  if (!data) return;
  document.getElementById("bonusBal").textContent = fmt(data.bonus_balance);
  document.getElementById("stakeBal").textContent = fmt(data.stake_balance);
}

function updateDaily(data) {
  var tbody = document.getElementById("dailyBody");
  if (!data || !data.length) {
    tbody.innerHTML = "<tr><td colspan=\"10\" style=\"text-align:center;padding:20px;color:#64748b;\">暂<span>无历史数据</span></td></tr>";
    return;
  }
  var html = "";
  for (var i = 0; i < data.length; i++) {
    var r = data[i];
    var ns = Number(r.net_stake);
    var dt = Number(r.dynamic_in) - Number(r.static_burn);
    var dtFmt = dt > 0 ? fmt(dt) : "0.00";
    var tr720 = Number(r.transfer_720) || 0;
    var tr720Fmt = tr720 > 0 ? fmt(tr720) : "0.00";
    html += "<tr>" +
      "<td>" + r.date + "</td>" +
      "<td>" + fmt(r.bonus_balance) + "</td>" +
      "<td>" + fmt(r.bonus_withdraw) + "</td>" +
      "<td>" + fmt(r.dynamic_in) + "</td>" +
      "<td>" + fmt(r.static_burn) + "</td>" +
      "<td>" + dtFmt + "</td>" +
      "<td>" + tr720Fmt + "</td>" +
      "<td>" + fmt(r.stake_balance) + "</td>" +
      "<td class=\"pos\">" + fmt(r.stake_in) + "</td>" +
      "<td class=\"neg\">" + fmt(r.stake_out) + "</td>" +
      "<td class=\"" + (ns >= 0 ? "pos" : "neg") + "\">" + fmt(ns) + "</td>" +
      "</tr>";
  }
  tbody.innerHTML = html;
}

function updateEvents(allEvents) {
  var box = document.getElementById("eventStream");
  if (!allEvents || !allEvents.length) {
    box.innerHTML = "<div style=\"text-align:center;color:#64748b;padding:10px;\">暂无事件</div>";
    return;
  }
  var html = "";
  var maxItems = Math.min(allEvents.length, 50);
  for (var i = 0; i < maxItems; i++) {
    var e = allEvents[i];
    var label = TYPE_LABELS[e.type] || e.type;
    var ts = e.timestamp ? new Date(new Date(e.timestamp).getTime() + 8*3600000).toISOString().slice(11, 19) : "";
    var txLink = e.tx ? "<a href=\"https://bscscan.com/tx/" + e.tx + "\" target=\"_blank\" style=\"color:#60a5fa;text-decoration:none;\">" + e.tx.slice(0, 10) + "...</a>" : "-";
    var fromShort = e.from_addr ? e.from_addr.slice(0, 6) + "..." + e.from_addr.slice(-4) : "-";
    var toShort = e.to_addr ? e.to_addr.slice(0, 6) + "..." + e.to_addr.slice(-4) : "-";
    html += "<div class=\"event-item\">" +
      "<span><span class=\"event-type " + e.type + "\">" + label + "</span> " + ts + " " + txLink + "<br><span style=\"color:#64748b;font-size:10px;\">" + fromShort + " &rarr; " + toShort + "</span></span>" +
      "<span style=\"font-weight:600;\">" + fmt(e.value) + " ARK</span>" +
      "</div>";
  }
  box.innerHTML = html;
}

var trendChart = null;

function updateTrend(data) {
  if (!data || !data.length) return;
  var labels = [], turbo = [], sb = [], bo = [], si = [], so = [];
  for (var i = 0; i < data.length; i++) {
    labels.push(data[i].hour + ":00");
    turbo.push(data[i].dynamic_turbo);
    sb.push(data[i].static_burn);
    bo.push(data[i].bonus_withdraw);
    si.push(data[i].stake_in);
    so.push(data[i].stake_out);
  }
  var ctx = document.getElementById("trendChart").getContext("2d");
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [{
        label: "动态涡轮",
        data: turbo,
        borderColor: "#2dd4bf",
        backgroundColor: "rgba(45,212,191,0.1)",
        fill: true,
        tension: 0.3,
        pointRadius: 2
      }, {
        label: "静态涡轮",
        data: sb,
        borderColor: "#a78bfa",
        backgroundColor: "rgba(167,139,250,0.1)",
        fill: true,
        tension: 0.3,
        pointRadius: 2
      }, {
        label: "奖金池提取",
        data: bo,
        borderColor: "#f59e0b",
        backgroundColor: "rgba(245,158,11,0.1)",
        fill: true,
        tension: 0.3,
        pointRadius: 2
      }, {
        label: "新增质押",
        data: si,
        borderColor: "#22c55e",
        backgroundColor: "rgba(34,197,94,0.1)",
        fill: true,
        tension: 0.3,
        pointRadius: 2
      }, {
        label: "赎回",
        data: so,
        borderColor: "#ef4444",
        backgroundColor: "rgba(239,68,68,0.1)",
        fill: true,
        tension: 0.3,
        pointRadius: 2
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { labels: { color: "#94a3b8" } } },
      scales: {
        x: { ticks: { color: "#64748b", maxTicksLimit: 12 }, grid: { color: "#334155" } },
        y: { ticks: { color: "#64748b" }, grid: { color: "#334155" } }
      }
    }
  });
}

function loadAll() {
  Promise.all([
    fetchAPI("/api/today"),
    fetchAPI("/api/daily"),
    fetchAPI("/api/realtime?limit=50"),
    fetchAPI("/api/today-trend")
  ]).then(function(results) {
    var today = results[0];
    var daily = results[1];
    var realtime = results[2];
    var trend = results[3];
    updateHeader(today);
    updateToday(today ? today.data : null);
    updateDaily(daily ? daily.data : null);
    updateEvents(realtime ? realtime.data : null);
    try { updateTrend(trend ? trend.data : null); } catch(e) { console.error("updateTrend error:", e); }
  }).catch(function(err) {
	console.error("loadAll error:", err);
  });
}

loadAll();
setInterval(loadAll, 30000);
</script>
</body>
</html>
